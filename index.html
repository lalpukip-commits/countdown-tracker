<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Tracker</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
</head>
<body>
    <div class="container">
        <h2>Fee & Task Tracker</h2>
        
        <div class="input-section">
            <input type="text" id="purpose" placeholder="Purpose (e.g. Library Fee)">
            <input type="number" id="duration" placeholder="Days (Min 2)" min="2">
            <button onclick="addEntry()">Save Entry</button>
        </div>

        <div id="entriesList"></div>
    </div>
    <script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker Registered"));
    }
</script>
</body>
</html>
